name: Sync wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync wiki pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Configure git identity
          git config --global user.name "diShine digital agency"
          git config --global user.email "kevin@dishine.it"

          # Clone the wiki repository using the automatic GITHUB_TOKEN
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo

          # Remove all existing wiki pages so deleted files are also removed
          rm -f wiki-repo/*.md

          # Copy all wiki pages from the wiki/ directory
          cp wiki/*.md wiki-repo/

          # Commit and push changes
          cd wiki-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "Sync wiki from main repository"
            git push
            echo "Wiki updated successfully."
          fi
