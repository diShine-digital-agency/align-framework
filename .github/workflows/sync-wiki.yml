name: Sync wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
  workflow_dispatch:

# Note: this workflow requires a Personal Access Token (PAT) stored as
# a repository secret named WIKI_TOKEN. The default GITHUB_TOKEN does not
# have permission to push to the .wiki.git repository.
#
# To set this up:
# 1. Go to https://github.com/settings/tokens and create a fine-grained PAT
#    with "Contents: Read and write" permission scoped to this repository.
# 2. In this repository, go to Settings → Secrets and variables → Actions.
# 3. Create a new repository secret named WIKI_TOKEN with the PAT value.
# 4. The wiki must be initialized first: go to the repository Wiki tab,
#    create any initial page (it can be blank), then save it. This creates
#    the .wiki.git repository that this workflow pushes to.

permissions:
  contents: read

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync wiki pages
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          # Fail early if the secret is not configured
          if [ -z "${WIKI_TOKEN}" ]; then
            echo "::error::WIKI_TOKEN secret is not set. See workflow comments for setup instructions."
            exit 1
          fi

          # Configure git identity
          git config --global user.name "diShine digital agency"
          git config --global user.email "kevin@dishine.it"

          # Clone the wiki repository
          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo

          # Remove all existing wiki pages so deleted files are also removed
          rm -f wiki-repo/*.md

          # Copy all wiki pages from the wiki/ directory
          cp wiki/*.md wiki-repo/

          # Commit and push changes
          cd wiki-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "Sync wiki from main repository"
            git push
            echo "Wiki updated successfully."
          fi
